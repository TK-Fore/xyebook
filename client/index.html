<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- 资源预加载 - 提升首屏加载速度 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://via.placeholder.com">
    
    <!-- 预加载关键字体 -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" as="style">
    <link rel="preload" href="https://fonts.gstatic.com/s/notosanssc/v36/k3kCo84MPvpLmixcA63oeALhLOCT-xWdqOhi.woff2" as="font" type="font/woff2" crossorigin>
    
    <!-- DNS 预解析 -->
    <link rel="dns-prefetch" href="https://via.placeholder.com">
    <link rel="dns-prefetch" href="https://xyebook.com">
    
    <!-- 结构化数据 - SEO优化 -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "小羊书吧",
      "url": "https://xyebook.com/",
      "description": "优质小说阅读平台，提供海量都市、玄幻、仙侠、历史、科幻等类型小说",
      "publisher": {
        "@type": "Organization",
        "name": "小羊书吧"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://xyebook.com/?keyword={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "小羊书吧",
      "url": "https://xyebook.com",
      "logo": "https://xyebook.com/logo.png",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+86-xxx-xxxx-xxxx",
        "contactType": "customer service"
      }
    }
    </script>
    
    <!-- 图片预加载优化 -->
    <link rel="preload" as="image" href="/favicon.svg">
    
    <!-- 基础 Meta 标签 -->
    <title>小羊书吧 - 优质小说阅读平台</title>
    <meta name="description" content="小羊书吧提供海量优质小说资源，包含都市、玄幻、仙侠、历史、科幻等多种类型，满足不同读者的阅读需求。新书抢先看，免费阅读！" />
    <meta name="keywords" content="小说,阅读,网络小说,电子书,玄幻小说,都市小说,仙侠小说,免费小说,在线阅读" />
    <meta name="author" content="小羊书吧" />
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://xyebook.com/" />
    
    <!-- 补充 SEO -->
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="/favicon.svg">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://xyebook.com/" />
    <meta property="og:title" content="小羊书吧 - 优质小说阅读平台" />
    <meta property="og:description" content="小羊书吧提供海量优质小说资源，包含都市、玄幻、仙侠、历史、科幻等多种类型，满足不同读者的阅读需求。" />
    <meta property="og:image" content="https://xyebook.com/og-image.png" />
    <meta property="og:site_name" content="小羊书吧" />
    <meta property="og:locale" content="zh_CN" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://xyebook.com/" />
    <meta name="twitter:title" content="小羊书吧 - 优质小说阅读平台" />
    <meta name="twitter:description" content="小羊书吧提供海量优质小说资源，满足不同读者的阅读需求。" />
    <meta name="twitter:image" content="https://xyebook.com/og-image.png" />
    
    <!-- 关键 CSS 内联 - 提升首屏渲染 -->
    <style>
      :root {
        --primary: #89CFF0;
        --primary-dark: #5DADE2;
        --primary-lighter: #E8F4F8;
        --bg-main: #F8FBFD;
        --bg-card: #FFFFFF;
        --text-primary: #2C3E50;
        --text-secondary: #7F8C8D;
        --text-light: #95A5A6;
        --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
        --radius: 12px;
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-main); color: var(--text-primary); line-height: 1.6; min-height: 100vh; }
      #root { width: 100%; min-height: 100vh; }
      .header { background: linear-gradient(135deg, var(--primary) 0%, #B0E0E6 100%); padding: 0.875rem 1.5rem; position: sticky; top: 0; z-index: 1000; }
      .header-content { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; gap: 1rem; }
      .logo { font-size: 1.375rem; font-weight: 700; color: white; display: flex; align-items: center; gap: 0.5rem; }
      .search-box { flex: 1; max-width: 500px; position: relative; }
      .search-input { width: 100%; padding: 0.625rem 1.25rem 0.625rem 2.5rem; border: 2px solid rgba(255,255,255,0.3); border-radius: 25px; font-size: 0.9375rem; background: rgba(255,255,255,0.95); outline: none; }
      .main-content { max-width: 1400px; margin: 0 auto; padding: 2rem 1.5rem; min-height: calc(100vh - 200px); }
      .novel-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
      @media (max-width: 1200px) { .novel-grid { grid-template-columns: repeat(3, 1fr); } }
      @media (max-width: 900px) { .novel-grid { grid-template-columns: repeat(2, 1fr); } }
      @media (max-width: 600px) { 
        .novel-grid { grid-template-columns: 1fr; }
        .header-content { flex-wrap: wrap; }
        .nav-links { display: none; }
        .nav-toggle { display: block; }
      }
    </style>
    
    <!-- 主题色 -->
    <meta name="theme-color" content="#4a90d9" />
    
    <!-- 性能监控 (生产环境) -->
    <script>
      (function() {
        'use strict';
        // 只在生产环境监控
        if (location.hostname === 'xyebook.com' || location.hostname === 'www.xyebook.com') {
          window.addEventListener('load', function() {
            setTimeout(function() {
              var perfData = window.performance.timing;
              var pageLoadTime = perfData.loadEventEnd - perfData.navigationStart;
              var ttfb = perfData.responseStart - perfData.navigationStart;
              console.log('页面加载时间: ' + pageLoadTime + 'ms, TTFB: ' + ttfb + 'ms');
            }, 0);
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
